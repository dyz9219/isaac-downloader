name: Build Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Build exe
        run: |
          pyinstaller AgibotConverterShell.spec --noconfirm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgibotConverterShell-Windows
          path: dist/AgibotConverterShell/

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0
      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]"
      - name: Build binary
        run: |
          pyinstaller AgibotConverterShell.spec --noconfirm
      - name: Make executable
        run: |
          chmod +x dist/AgibotConverterShell/AgibotConverterShell
      - name: Create archive
        run: |
          cd dist && tar -czvf AgibotConverterShell-Linux-x64.tar.gz AgibotConverterShell
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgibotConverterShell-Linux-x64
          path: dist/AgibotConverterShell-Linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm  # GitHub ARM runner
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0
      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]"
      - name: Build binary
        run: |
          pyinstaller AgibotConverterShell.spec --noconfirm
      - name: Make executable
        run: |
          chmod +x dist/AgibotConverterShell/AgibotConverterShell
      - name: Create archive
        run: |
          cd dist && tar -czvf AgibotConverterShell-Linux-ARM64.tar.gz AgibotConverterShell
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgibotConverterShell-Linux-ARM64
          path: dist/AgibotConverterShell-Linux-ARM64.tar.gz
