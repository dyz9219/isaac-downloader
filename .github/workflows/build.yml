name: Build Multi-Platform

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Verify environment
        run: |
          python -m pip show pyinstaller
          python -c "import PyInstaller,sys; print('PyInstaller', PyInstaller.__version__, 'Python', sys.executable)"
      - name: Build full package
        run: |
          ./scripts/build_exe.ps1 -Profile full -Clean
      - name: Verify packaged any4
        run: |
          ./scripts/verify_packaged_any4.ps1 -DistRoot dist/AgibotConverterShell-full
      - name: Verify build fingerprint
        run: |
          ./scripts/verify_build_fingerprint.ps1 -ExePath dist/AgibotConverterShell-full/AgibotConverterShell-full.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgibotConverterShell-Windows-full
          path: dist/AgibotConverterShell-full/

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Verify PyInstaller
        run: |
          python -m pip show pyinstaller
          python -c "import PyInstaller,sys; print('PyInstaller', PyInstaller.__version__, 'Python', sys.executable)"
      - name: Build binary
        run: |
          EXTRA_ARGS=()
          if [ -d "$PWD/assets" ]; then
            EXTRA_ARGS+=(--add-data "$PWD/assets:assets")
          fi
          python -m PyInstaller --noconfirm --onefile --windowed --name AgibotConverterShell --distpath dist --workpath build --collect-all flet --collect-all flet_desktop --collect-all rosbags --collect-submodules rosbags.typesys.stores --collect-data tkinter --add-data "$PWD/any4lerobot:any4lerobot" "${EXTRA_ARGS[@]}" src/agibot_converter/main.py
      - name: Make executable
        run: |
          chmod +x dist/AgibotConverterShell
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgibotConverterShell-Linux-x64
          path: dist/AgibotConverterShell

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm  # GitHub ARM runner
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Verify PyInstaller
        run: |
          python -m pip show pyinstaller
          python -c "import PyInstaller,sys; print('PyInstaller', PyInstaller.__version__, 'Python', sys.executable)"
      - name: Build binary
        run: |
          EXTRA_ARGS=()
          if [ -d "$PWD/assets" ]; then
            EXTRA_ARGS+=(--add-data "$PWD/assets:assets")
          fi
          python -m PyInstaller --noconfirm --onefile --windowed --name AgibotConverterShell --distpath dist --workpath build --collect-all flet --collect-all flet_desktop --collect-all rosbags --collect-submodules rosbags.typesys.stores --collect-data tkinter --add-data "$PWD/any4lerobot:any4lerobot" "${EXTRA_ARGS[@]}" src/agibot_converter/main.py
      - name: Make executable
        run: |
          chmod +x dist/AgibotConverterShell
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgibotConverterShell-Linux-ARM64
          path: dist/AgibotConverterShell
